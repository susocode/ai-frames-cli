name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true && (
        contains(github.event.pull_request.labels.*.name, 'release/patch') ||
        contains(github.event.pull_request.labels.*.name, 'release/minor') ||
        contains(github.event.pull_request.labels.*.name, 'release/major')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine bump type
        id: bump_type
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'release/major') }}" == "true" ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'release/minor') }}" == "true" ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: bump
        run: |
          npm version ${{ steps.bump_type.outputs.type }} --no-git-tag-version
          NPM_VERSION=$(node -p "require('./package.json').version")
          echo "version=v${NPM_VERSION}" >> $GITHUB_OUTPUT
          echo "npm_version=${NPM_VERSION}" >> $GITHUB_OUTPUT

      - name: Build
        run: npm run build:all

      - name: Publish to npm
        run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit, tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.bump.outputs.version }} [skip ci]"
          git tag ${{ steps.bump.outputs.version }}
          git push
          git push --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.bump.outputs.version }} \
            --title "${{ steps.bump.outputs.version }}" \
            --generate-notes

      - name: Update Homebrew tap
        run: bash scripts/update-tap.sh ${{ steps.bump.outputs.npm_version }}
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
